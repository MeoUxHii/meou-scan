<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MeoU Scan</title>
<link rel="icon" type="image/png" sizes="16x16" href="/static/icons/icon16.png">
<link rel="icon" type="image/png" sizes="128x128" href="/static/icons/icon128.png">
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script src="https://npmcdn.com/flatpickr/dist/l10n/vn.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>
<style>
body{font-family:'Quicksand',sans-serif;background:linear-gradient(135deg,#e0c3fc 0%,#8ec5fc 100%);background-attachment:fixed}
.custom-scrollbar::-webkit-scrollbar{width:8px}
.custom-scrollbar::-webkit-scrollbar-track{background:rgba(255,255,255,0.3)}
.custom-scrollbar::-webkit-scrollbar-thumb{background:#8ec5fc;border-radius:10px}
.bg-meou-main{background:linear-gradient(90deg,#a18cd1 0%,#8ec5fc 100%)}
.text-meou-dark{color:#5a54a4}
tr{height:65px!important}
.rounded-card{border-radius:40px}
@keyframes slideIn{from{transform:translate(-50%,-20px);opacity:0}to{transform:translate(-50%,0);opacity:1}}
.animate-slide-in{animation:slideIn 0.3s ease-out forwards}
@keyframes slideDown{from{transform:translateY(-10px);opacity:0}to{transform:translateY(0);opacity:1}}
.animate-slide-down{animation:slideDown 0.2s ease-out forwards}
@keyframes fadeCycle{0%{opacity:0;transform:translateY(10px);filter:blur(5px)}10%{opacity:1;transform:translateY(0);filter:blur(0)}90%{opacity:1;transform:translateY(0);filter:blur(0)}100%{opacity:0;transform:translateY(-10px);filter:blur(5px)}}
.loading-text-anim{animation:fadeCycle 3s infinite}
.flatpickr-calendar{background:#fff;border-radius:25px!important;border:2px solid #e0c3fc!important;box-shadow:0 15px 45px rgba(90,84,164,0.2)!important;width:320px!important}
.flatpickr-day.selected{background:#a18cd1!important;border-color:#a18cd1!important;border-radius:12px!important}
</style>
</head>
<body class="min-h-screen p-4 md:p-8 text-slate-700 relative">
<div id="meouAlert" class="hidden fixed top-10 left-1/2 -translate-x-1/2 z-[100] min-w-[320px] p-5 rounded-2xl shadow-2xl bg-meou-main text-white font-bold text-center animate-slide-in border border-white/30">
<p id="alertMsg"></p>
</div>
<div class="max-w-7xl mx-auto bg-white/95 rounded-card shadow-[0_20px_50px_rgba(0,0,0,0.15)] p-8 md:p-12 border border-white/50">
<div class="flex flex-col md:flex-row justify-between items-center mb-10 gap-6">
<div class="flex items-center gap-4">
<img src="/static/icons/icon64.png" class="w-14 h-14 rounded-2xl shadow-sm" alt="MeoU Logo">
<div>
<h1 class="text-5xl font-extrabold text-meou-dark tracking-tighter">MeoU Scan</h1>
<p class="text-indigo-400 text-sm font-bold uppercase tracking-[0.3em] mt-1">Một Sản Phẩm Thuộc FFQ Team</p>
</div>
</div>
<div class="flex gap-4 items-center relative">
<button id="saveTempBtn" class="hidden bg-gradient-to-r from-[#92fe9d] to-[#00c9ff] hover:opacity-90 text-white font-bold py-4 px-6 rounded-3xl shadow-lg transition-all active:scale-95 text-lg">Lưu Tạm</button>
<button id="exportBtn" class="hidden bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-4 px-8 rounded-3xl shadow-lg transition-all active:scale-95 text-lg">Xuất Excel</button>
<div id="archiveContainer" class="hidden relative">
<button id="archiveIconBtn" class="bg-white hover:bg-indigo-50 border-2 border-indigo-100 p-3 rounded-2xl shadow-sm transition-all relative h-[60px] w-[60px] flex items-center justify-center">
<svg width="32px" height="32px" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
<path d="M2 5C2 4.05719 2 3.58579 2.29289 3.29289C2.58579 3 3.05719 3 4 3H20C20.9428 3 21.4142 3 21.7071 3.29289C22 3.58579 22 4.05719 22 5C22 5.94281 22 6.41421 21.7071 6.70711C21.4142 7 20.9428 7 20 7H4C3.05719 7 2.58579 7 2.29289 6.70711C2 6.41421 2 5.94281 2 5Z" fill="#1C274C"/>
<path fill-rule="evenodd" clip-rule="evenodd" d="M20.0689 8.49993C20.2101 8.49999 20.3551 8.50005 20.5 8.49805V12.9999C20.5 16.7711 20.5 18.6568 19.3284 19.8283C18.1569 20.9999 16.2712 20.9999 12.5 20.9999H11.5C7.72876 20.9999 5.84315 20.9999 4.67157 19.8283C3.5 18.6568 3.5 16.7711 3.5 12.9999V8.49805C3.64488 8.50005 3.78999 8.49999 3.93114 8.49993H20.0689ZM14.9995 12.1906C15.3085 12.4664 15.3353 12.9405 15.0595 13.2495L11.488 17.2495C11.3457 17.4089 11.1422 17.5 10.9286 17.5C10.7149 17.5 10.5114 17.4089 10.3691 17.2495L8.94055 15.6495C8.66468 15.3405 8.69152 14.8664 9.0005 14.5906C9.30947 14.3147 9.78359 14.3415 10.0595 14.6505L10.9286 15.6239L13.9406 12.2505C14.2164 11.9415 14.6905 11.9147 14.9995 12.1906Z" fill="#1C274C"/>
</svg>
<span id="archiveBadge" class="absolute -top-2 -right-2 bg-red-600 text-white font-extrabold text-xs w-6 h-6 flex items-center justify-center rounded-full shadow-md border-2 border-white">0</span>
</button>
<div id="archiveDropdown" class="hidden absolute right-0 top-full mt-3 w-80 bg-white rounded-3xl shadow-2xl border-2 border-indigo-50 z-50 overflow-hidden animate-slide-down">
<div class="bg-indigo-50/50 px-4 py-3 border-b border-indigo-100 flex justify-between items-center"><span class="font-bold text-meou-dark">Danh sách đã lưu</span></div>
<ul id="archiveList" class="max-h-64 overflow-y-auto p-2 custom-scrollbar"></ul>
<div class="p-3 border-t border-indigo-50 bg-slate-50 flex justify-between items-center gap-2">
<button id="deleteAllBtn" class="w-1/2 text-red-500 hover:text-white hover:bg-red-500 border border-red-200 px-3 py-2 rounded-xl text-sm font-bold transition-colors">Xóa tất cả</button>
<button id="downloadAllBtn" class="w-1/2 bg-gradient-to-r from-[#92fe9d] to-[#00c9ff] text-white shadow-sm px-3 py-2 rounded-xl text-sm font-bold hover:opacity-90 transition-opacity">Tải tất cả</button>
</div>
</div>
</div>
<a href="/logout" class="bg-white/50 hover:bg-red-50 text-red-500 font-bold py-4 px-6 rounded-3xl shadow-sm border border-red-100 transition-all active:scale-95 text-lg">Đăng Xuất</a>
</div>
</div>
<div class="grid grid-cols-1 md:grid-cols-3 gap-8 mb-10 p-8 bg-indigo-50/50 rounded-[35px] border-2 border-dashed border-indigo-200">
<div>
<label class="block text-sm font-bold text-meou-dark mb-3 px-2 uppercase tracking-wider">Ngày bắt đầu</label>
<input type="text" id="startDate" placeholder="Chọn ngày" class="w-full p-4 rounded-2xl border-2 border-indigo-100 focus:border-indigo-400 outline-none text-base font-bold shadow-sm bg-white">
</div>
<div>
<label class="block text-sm font-bold text-meou-dark mb-3 px-2 uppercase tracking-wider">Ngày kết thúc</label>
<input type="text" id="endDate" placeholder="Chọn ngày" class="w-full p-4 rounded-2xl border-2 border-indigo-100 focus:border-indigo-400 outline-none text-base font-bold shadow-sm bg-white">
</div>
<div class="flex items-end">
<button id="scanBtn" class="w-full bg-meou-main hover:brightness-110 text-white font-bold py-4 rounded-2xl shadow-lg transition-all active:scale-95 text-xl tracking-widest uppercase">Quét Ngay</button>
</div>
</div>
<textarea id="linksInput" rows="1" class="w-full p-5 border-2 border-indigo-50 rounded-2xl focus:border-indigo-300 mb-8 shadow-inner text-base outline-none font-bold placeholder:text-slate-400 bg-slate-50/50" placeholder="Dán link kênh vào đây..."></textarea>
<div id="loading" class="hidden text-center my-8 text-indigo-500 font-bold text-xl h-10">
<p id="loadingText" class="loading-text-anim"></p>
</div>
<div class="overflow-hidden rounded-[35px] border border-indigo-100 shadow-xl bg-white">
<table class="w-full border-collapse table-fixed">
<thead>
<tr class="bg-meou-main text-white text-base font-bold">
<th class="w-[12%] p-5 text-center border-r border-white/20">Ngày</th>
<th class="w-[28%] p-5 text-left px-8 border-r border-white/20 uppercase tracking-tighter">YouTube Link</th>
<th class="w-[10%] p-5 text-center border-r border-white/20">Loại</th>
<th class="w-[10%] p-5 text-center border-r border-white/20 uppercase">Giỏ hàng</th>
<th class="w-[40%] p-5 text-center">Chi tiết Link</th>
</tr>
</thead>
<tbody id="resultTableBody" class="font-bold text-slate-700 text-base"></tbody>
</table>
</div>
</div>
<script>
let currentData={results:[],channel_name:"MeoU"};
let temporaryStorage=[];
let isCurrentSaved=false;
let loadingInterval;
const loadingMessages=[
  "Đang Rà Soát Dữ Liệu...🙄🤏",
  "Đang Đấm Nhau Với Mã Nguồn...🤛😠",
  "Ớ ~ ~ ~ ~ 😵‍💫 Thua Rồi...",
  "Đang Thương Lượng Với Google...😑🤝",
  "Lại Đấm Nhau Vì Không Thương Lượng Được...🤬",
  "Đang Liên Hệ Với Yang Hồ...🤙😤",
  "Đang Đứng Vuốt Tóc Chờ Yang Hồ Dẹp Loạn... 💇‍♂️💅",
  "Yang Hồ Bị Đánh Chạy Cỏn Đuôi... 😱🐕",
  "Đang Tìm Cách Rình Mò Data... 🤪🦯",
  "Đang Bị Server Rượt Chạy Tụt Quần... 🏃‍♂️👖",
  "Đang Núp Lùm Chờ Youtube Đi... 🌳🫣",
  "Đang Móc Trộm Dữ Liệu Bỏ Vô Túi... 🥷👝",
  "Đang Suy Tư Xem Mình Đang Làm Gì... 🤔",
  "Ờ Sao Mình Lại Ở Đây Nhể... 📦😎"
  "Ô Cậu Bảnh"
];
const fpkConfig={locale:"vn",dateFormat:"Y-m-d",altInput:true,altFormat:"d/m/Y",maxDate:"today",disableMobile:"true"};
const startPicker=flatpickr("#startDate",{...fpkConfig,onChange:(d,str)=>endPicker.set("minDate",str)});
const endPicker=flatpickr("#endDate",fpkConfig);
function showMeoUAlert(m){const b=document.getElementById('meouAlert');document.getElementById('alertMsg').innerText=m;b.classList.remove('hidden');setTimeout(()=>b.classList.add('hidden'),3500)}
document.getElementById('scanBtn').addEventListener('click',async()=>{
const u=document.getElementById('linksInput').value.split('\n').map(v=>v.trim()).filter(v=>v!=='');
const s=document.getElementById('startDate').value;
const e=document.getElementById('endDate').value;
if(!s||!e)return showMeoUAlert('Vui lòng chọn ngày!');
if(u.length===0)return showMeoUAlert('Chưa dán link!');
const lD=document.getElementById('loading');const lT=document.getElementById('loadingText');lD.classList.remove('hidden');let mi=0;lT.innerText=loadingMessages[mi];
if(loadingInterval)clearInterval(loadingInterval);
loadingInterval=setInterval(()=>{mi=(mi+1)%loadingMessages.length;lT.innerText=loadingMessages[mi]},3000);
document.getElementById('resultTableBody').innerHTML='';document.getElementById('exportBtn').classList.add('hidden');document.getElementById('saveTempBtn').classList.add('hidden');isCurrentSaved=false;
try{
const res=await fetch('/api/scan',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({urls:u,startDate:s,endDate:e})});
currentData=await res.json();const tb=document.getElementById('resultTableBody');
if(currentData.results&&currentData.results.length>0){
document.getElementById('exportBtn').classList.remove('hidden');document.getElementById('saveTempBtn').classList.remove('hidden');
currentData.results.forEach(r=>{
const tr=document.createElement('tr');tr.className="border-b border-indigo-50 hover:bg-indigo-50/20 transition-all";
let tc=r.type==='Short'?'text-pink-500':(r.type==='Stream'?'text-purple-600':'text-blue-500');
let sh=r.has_shopping?'<span class="text-emerald-500 font-extrabold text-lg">Có</span>':'<span class="text-slate-300">Không</span>';
let lh='';if(r.has_shopping){
let tl=r.shopping_links.filter(i=>i.platform==='Shopee'||i.platform==='Lazada');
if(tl.length>0){
const items=tl.map(i=>{let bc=i.platform==='Shopee'?'text-orange-500 bg-orange-50 border-orange-200':'text-blue-600 bg-blue-50 border-blue-200';
return `<li class="mb-2 text-[13px] border-b border-indigo-50 pb-2 flex items-center gap-2"><span class="font-extrabold text-[10px] uppercase px-2 py-1 rounded border ${bc}">${i.platform}</span><a href="${i.clean_url}" target="_blank" class="text-indigo-600 hover:text-indigo-800 truncate block w-full">${i.clean_url}</a></li>`}).join('');
lh=`<div class="px-6 py-2"><button class="toggle-btn w-full bg-indigo-50 text-indigo-600 font-extrabold py-3 px-4 rounded-2xl border border-indigo-100 text-xs shadow-sm">Giỏ hàng: ${tl.length} SP ▼</button><ul class="link-list hidden mt-3 p-5 bg-white rounded-2xl border border-indigo-100 text-left custom-scrollbar overflow-y-auto max-h-48 shadow-xl">${items}</ul></div>`
}else lh=`<span class="text-slate-400 text-sm font-medium">${r.other_count} Sản phẩm khác</span>`}else lh='<span class="text-slate-300">Trống</span>';
tr.innerHTML=`<td class="text-center text-sm text-slate-500 border-r border-indigo-50">${r.display_date}</td><td class="text-sm px-8 truncate border-r border-indigo-50 text-slate-400 font-medium"><a href="${r.url}" target="_blank">${r.url}</a></td><td class="text-center border-r border-indigo-50 text-xs uppercase font-black ${tc}">${r.type}</td><td class="text-center text-sm border-r border-indigo-50">${sh}</td><td class="text-center w-full">${lh}</td>`;
tb.appendChild(tr);const b=tr.querySelector('.toggle-btn');if(b)b.onclick=()=>b.nextElementSibling.classList.toggle('hidden')})}else showMeoUAlert('Không tìm thấy video!')}catch(err){showMeoUAlert('Lỗi kết nối!')}finally{clearInterval(loadingInterval);lD.classList.add('hidden')}});
function exportToExcelCore(arr,f){
const rows=[["Ngày Đăng","Channel Name","Link YouTube","Loại Video","Có Gắn Giỏ Hàng?","Tổng SP Shopee","Tổng SP Lazada","Link SP","SP Thuộc","TỔNG SP Khác"]];
const st={alignment:{vertical:'center',horizontal:'center'},border:{top:{style:'thin'},bottom:{style:'thin'},left:{style:'thin'},right:{style:'thin'}}};
arr.forEach(d=>{d.results.forEach(v=>{
let tl=v.shopping_links.filter(i=>i.platform==='Shopee'||i.platform==='Lazada');
if(tl.length>0){tl.forEach(l=>{rows.push([v.display_date,v.channel_name,v.url,v.type,v.has_shopping?"Có":"Không",v.shopee_count,v.lazada_count,l.clean_url,l.platform,v.other_count])})}
else if(v.other_count>0){rows.push([v.display_date,v.channel_name,v.url,v.type,"Có",v.shopee_count,v.lazada_count,"","Sàn Khác",v.other_count])}
else rows.push([v.display_date,v.channel_name,v.url,v.type,"Không",v.shopee_count,v.lazada_count,"","",v.other_count])})});
const ws=XLSX.utils.aoa_to_sheet(rows);ws['!cols']=[{wch:15},{wch:25},{wch:35},{wch:12},{wch:18},{wch:18},{wch:18},{wch:60},{wch:12},{wch:18}];
for(let c in ws){if(c[0]==='!')continue;let r=XLSX.utils.decode_cell(c);let v=ws[c].v;let s=JSON.parse(JSON.stringify(st));
if(r.r===0){s.fill={fgColor:{rgb:"002060"}};s.font={bold:true,color:{rgb:"FFFFFF"}}}
else{if(r.c===2||r.c===7)s.alignment.horizontal='left';if(r.c===4)s.font={bold:true,color:{rgb:v==="Có"?"00B050":"FF0000"}};
if(r.c===8){if(v==="Shopee")s.font={bold:true,color:{rgb:"FF8C00"}};else if(v==="Lazada")s.font={bold:true,color:{rgb:"FF1493"}}}}ws[c].s=s}
const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,"MeoU");XLSX.writeFile(wb,f)}
function updateArchiveUI(){
const b=document.getElementById('archiveBadge');const l=document.getElementById('archiveList');const c=document.getElementById('archiveContainer');
if(temporaryStorage.length===0){c.classList.add('hidden');document.getElementById('archiveDropdown').classList.add('hidden');return}
c.classList.remove('hidden');b.innerText=temporaryStorage.length;l.innerHTML='';
temporaryStorage.forEach((item,i)=>{
let n=item.channel_name.length>20?item.channel_name.substring(0,18)+'...':item.channel_name;
l.innerHTML+=`<li class="flex justify-between items-center p-2 hover:bg-indigo-50 rounded-xl mb-1 border border-transparent hover:border-indigo-100 transition-colors"><span class="text-sm font-bold text-slate-600 truncate mr-2">${n}</span><div class="flex gap-1">
<button onclick="downloadSingleFile(${i})" class="p-1.5 bg-blue-50 text-blue-500 rounded-lg hover:bg-blue-500 hover:text-white transition-colors"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg></button>
<button onclick="deleteSingleFile(${i})" class="p-1.5 bg-red-50 text-red-500 rounded-lg hover:bg-red-500 hover:text-white transition-colors"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg></button>
</div></li>`})}
window.downloadSingleFile=(i)=>{const d=temporaryStorage[i];exportToExcelCore([d],`MeoU_${d.channel_name}.xlsx`)};
window.deleteSingleFile=(i)=>{temporaryStorage.splice(i,1);updateArchiveUI();if(temporaryStorage.length===0&&currentData.results.length>0){document.getElementById('saveTempBtn').classList.remove('hidden');isCurrentSaved=false}};
document.getElementById('saveTempBtn').addEventListener('click',()=>{
if(isCurrentSaved)return;temporaryStorage.push(JSON.parse(JSON.stringify(currentData)));isCurrentSaved=true;
document.getElementById('saveTempBtn').classList.add('hidden');updateArchiveUI();showMeoUAlert('Đã lưu vào bộ nhớ!')});
document.getElementById('archiveIconBtn').addEventListener('click',(e)=>{e.stopPropagation();document.getElementById('archiveDropdown').classList.toggle('hidden')});
document.addEventListener('click',(e)=>{if(!document.getElementById('archiveContainer').contains(e.target))document.getElementById('archiveDropdown').classList.add('hidden')});
document.getElementById('exportBtn').addEventListener('click',()=>exportToExcelCore([currentData],`MeoU_${currentData.channel_name}.xlsx`));
document.getElementById('deleteAllBtn').addEventListener('click',()=>{temporaryStorage=[];updateArchiveUI();if(currentData.results.length>0){document.getElementById('saveTempBtn').classList.remove('hidden');isCurrentSaved=false}});
document.getElementById('downloadAllBtn').addEventListener('click',()=>{if(temporaryStorage.length>0)exportToExcelCore(temporaryStorage,`MeoU_TongHop_${temporaryStorage.length}_Kenh.xlsx`)});
</script>
</body>
</html>
